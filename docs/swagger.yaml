basePath: /
definitions:
  richerror.UserReport:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  studentparam.StudentPassDetail:
    properties:
      lesson_id:
        type: integer
      major_id:
        type: integer
      professor_id:
        type: integer
      university_id:
        type: integer
    type: object
host: localhost:3000
info:
  contact: {}
  description: Academic database API
  title: OSTADBUN API
  version: "1.0"
paths:
  /manipulation/permission:
    get:
      description: Check whether the current user has manipulation permission
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "401":
          description: Unauthorized
          schema: {}
      summary: Checking permission
      tags:
      - Permission
  /student/pass:
    post:
      consumes:
      - application/json
      description: Register a lesson that the authenticated student has already passed.
      parameters:
      - description: Passed lesson information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/studentparam.StudentPassDetail'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richerror.UserReport'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richerror.UserReport'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/richerror.UserReport'
      security:
      - BearerAuth: []
      tags:
      - Student
swagger: "2.0"
